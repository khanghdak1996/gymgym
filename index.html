input,button,textarea{

input:focus,button:focus{

::-webkit-scrollbar{
  display:none;
}

/* Animations */
.fade-in {
  animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.slide-up {
  animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.slide-in-right {
  animation: slideInRight 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.scale-in {
  animation: scaleIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.checkmark-pop {
  animation: checkmarkPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}
.pulse-glow {
  animation: pulseGlow 2s infinite ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes checkmarkPop {
  0% { transform: scale(0.6); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
@keyframes pulseGlow {
  0% { box-shadow: 0 0 0 0 var(--accent-glow); }
  70% { box-shadow: 0 0 0 10px rgba(0, 0, 0, 0); }
  100% { box-shadow: 0 0 0 0 rgba(0, 0, 0, 0); }
}
@keyframes pulseRedGlow {
  0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
  70% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
  100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
}
.pulse-red-glow {
  animation: pulseRedGlow 1.5s infinite ease-in-out;
}

/* Confetti effect */
.confetti-container {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  overflow: hidden;
  z-index: 9999;
}
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}
.confetti-piece {
  position: absolute;
  width: 8px;
  height: 12px;
  opacity: 0.8;
  animation: confettiFall 2.8s linear forwards;
}

/* Button & Card Micro-interactions */
.btn-action {
  transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s, opacity 0.15s, box-shadow 0.2s;
}
.btn-action:active {
  transform: scale(0.95);
}
.card-hover {
  transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s, border-color 0.2s;
}
.card-hover:active {
  transform: scale(0.975);
}

/* Custom styled inputs */
.workout-input {
  background: #ffffff;
  border: 1px solid rgba(0,0,0,0.1);
  color: #1a2030;
  transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s, color 0.2s;
}
.workout-input:focus {

  box-shadow: 0 0 8px var(--accent-glow);

  background: rgba(0,0,0,0.03) !important;
  color: #94a3b8 !important;
  border-color: rgba(0,0,0,0.05) !important;
}

const beep = () => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime); // High pitch notification beep
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.25, ctx.currentTime + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
  } catch (e) {
    console.warn('Audio Context error (autoplay block):', e);
  }
};

function ActiveWorkout({workout,onChange,onFinish,onDiscard,onPickEx}){
  const [elapsed,setElapsed]=useState(()=>Math.floor((Date.now()-workout.startTime)/1000));
  const [rest,setRest]=useState(null);
  const [restTime,setRestTime]=useState(90);

  useEffect(()=>{
    const iv=setInterval(()=>setElapsed(e=>e+1),1000);
    return()=>clearInterval(iv);
  },[]);

  useEffect(()=>{
    if(!rest||rest.secs<=0)return;
    const iv=setInterval(()=>{
      setRest(r=>{
        if(!r) return null;
        if(r.secs <= 1) {
          beep();
          return {...r, secs: 0};
        }
        return {...r, secs: r.secs - 1};
      });
    },1000);
    return()=>clearInterval(iv);
  },[rest&&rest.secs]);

  const updEx=async(i,ex)=>onChange({...workout,exs:workout.exs.map((e,j)=>j===i?ex:e)});
  const toggleSet=async(ei,si)=>{
    const ex=workout.exs[ei];
    const done=!ex.sets[si].done;
    const sets=ex.sets.map((s,j)=>j===si?{...s,done}:s);
    if(done)setRest({secs:restTime,max:restTime});
    await updEx(ei,{...ex,sets});
  };
  const updSet=async(ei,si,f,v)=>{
    const ex=workout.exs[ei];
    await updEx(ei,{...ex,sets:ex.sets.map((s,j)=>j===si?{...s,[f]:v}:s)});
  };
  const addSet=async(ei)=>{
    const ex=workout.exs[ei];
    const last=ex.sets[ex.sets.length-1]||{};
    await updEx(ei,{...ex,sets:[...ex.sets,{id:uid(),weight:last.weight||'',reps:last.reps||'',rpe:'',done:false}]});
  };
  const delSet=async(ei)=>{
    const ex=workout.exs[ei];
    if(ex.sets.length<=1)return;
    await updEx(ei,{...ex,sets:ex.sets.slice(0,-1)});
  };
  const replEx=(ei)=>onPickEx(async e=>{
    await onChange({...workout,exs:workout.exs.map((ex,i)=>i===ei?{...ex,exId:e.id,name:e.name}:ex)});
  });
  const addEx=()=>onPickEx(async e=>{
    await onChange({...workout,exs:[...workout.exs,{id:uid(),exId:e.id,name:e.name,sets:[{id:uid(),weight:'',reps:'',rpe:'',done:false}],notes:''}]});
  });
  const addRestSecs=n=>setRest(r=>r?{...r,secs:Math.max(0,r.secs+n),max:Math.max(r.max,r.secs+n)}:null);
  const vol=tVol(workout.exs);

  return html`
    <${Wrap}>
      <div style=${{background:'rgba(255,255,255,0.9)',backdropFilter:'blur(10px)',borderBottom:`1px solid ${C.bdr}`,padding:'14px 16px 12px',flexShrink:0}}>

          <div>
            <p style=${{margin:0,fontSize:11,color:C.txt3,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em'}}>${workout.progName}</p>
            <h2 style=${{margin:0,fontSize:20,fontWeight:800,color:C.txt1,letterSpacing:'-0.02em'}}>${workout.dayName}</h2>
          </div>
          <div style=${{textAlign:'right'}}>
            <p style=${{margin:0,fontSize:24,fontWeight:800,color:ACC,fontVariantNumeric:'tabular-nums',letterSpacing:'-0.02em'}}>${fT(elapsed)}</p>
            <p style=${{margin:0,fontSize:11,color:C.txt3,fontWeight:500}}>${Math.round(vol)} kg volume</p>
          </div>
        </div>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style=${{display:'flex',alignItems:'center',gap:6}}>
            <span style=${{fontSize:11,color:C.txt3,fontWeight:600}}>NGHل»ˆ:</span>
            ${REST_PRESETS.map(t=>html`
              <button key=${t} onClick=${()=>setRestTime(t)} class="btn-action" style=${{
                padding:'5px 10px',borderRadius:20,border:'none',cursor:'pointer',fontSize:12,fontWeight:600,
                background:restTime===t?ACC:'rgba(255,255,255,0.06)',
                color:restTime===t?'#fff':C.txt2,
                boxShadow:restTime===t?`0 2px 8px var(--accent-glow)`:'none'
              }}>${restLabel(t)}</button>`)}
          </div>
          <div style=${{display:'flex',gap:8}}>
            <button onClick=${()=>{if(window.confirm('Huل»· buل»•i tل؛­p?'))onDiscard();}} class="btn-action" style=${{background:C.bg3,border:`1px solid ${C.bdr}`,borderRadius:r.md,padding:'8px 14px',color:C.txt2,fontSize:12,fontWeight:600,cursor:'pointer'}}>Huل»·</button>
            <button onClick=${()=>{if(window.confirm('Kل؛؟t thأ؛c vأ  lئ°u buل»•i tل؛­p?'))onFinish();}} class="btn-action" style=${{background:C.green,border:'none',borderRadius:r.md,padding:'8px 16px',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',boxShadow:`0 4px 12px rgba(16,185,129,0.25)`}}>âœ“ Xong</button>
          </div>
        </div>
      </div>

      <!-- Radial Rest Timer Floating Card -->
      ${rest!==null&&html`

          <div style=${{display:'flex', gap:6, alignItems:'center'}}>
            ${rest.secs > 0 && html`

        ${workout.exs.map((ex,ei)=>html`

            </div>
            
            <div style=${{display:'grid',gridTemplateColumns:'24px 1fr 1fr 56px 40px',gap:8,marginBottom:8}}>

            ${ex.sets.map((set,si)=>html`

function GymPair(){
  const [pid,setPid]=useState(null);
  const [exList,setExList]=useState(EX);
  const [progs,setProgs]=useState([]);
  const [sessions,setSessions]=useState([]);
  const [active,setActive]=useState(null);
  const [tab,setTab]=useState('home');
  const [pg,setPg]=useState(null);
  const [pgCtx,setPgCtx]=useState(null);
  const [ready,setReady]=useState(false);
  const [showCelebration,setShowCelebration]=useState(false);
  const [finishedWorkout,setFinishedWorkout]=useState(null);

  useEffect(()=>{
    if(!pid){
      setReady(false);
      return;
    }
    const prof = PR.find(p => p.id === pid);
    if (prof) {
      document.documentElement.style.setProperty('--accent', prof.c);
      document.documentElement.style.setProperty('--accent-glow', prof.c + '26'); // 15% opacity
    }
    (async()=>{
      const[c,p,s,a]=await Promise.all([db.get(`c:${pid}`),db.get(`p:${pid}`),db.get(`s:${pid}`),db.get(`a:${pid}`)]);
      setExList(c?[...EX,...c]:EX);
      setProgs(p||[]);
      setSessions(s||[]);
      setActive(a||null);
      setReady(true);
    })();
  },[pid]);

  const saveP=p=>{setProgs(p);db.set(`p:${pid}`,p);};
  const saveS=s=>{setSessions(s);db.set(`s:${pid}`,s);};
  const saveA=a=>{setActive(a);db.set(`a:${pid}`,a);};
  const saveC=list=>{setExList(list);db.set(`c:${pid}`,list.filter(e=>!EX.find(b=>b.id===e.id)));};

  const startWorkout=(prog,di)=>{
    const day=prog.days[di];
    saveA({
      id:uid(),progId:prog.id,progName:prog.name,dayName:day.name,
      startTime:Date.now(),
      exs:day.exercises.map(pe=>({
        id:uid(),exId:pe.exId,name:pe.name,
        sets:Array.from({length:pe.sets||3},()=>({id:uid(),weight:'',reps:'',rpe:'',done:false})),
        notes:'',
      })),
    });
    setPg(null);setTab('home');
  };

  const finishWorkout=()=>{
    if(!active)return;
    const sess={...active,endTime:Date.now(),totalVol:tVol(active.exs),date:new Date(active.startTime).toISOString().split('T')[0]};
    const updatedSessions = [sess,...sessions].slice(0,300);
    saveS(updatedSessions);
    setFinishedWorkout(active);
    setShowCelebration(true);
    db.set(`a:${pid}`,null);
    setActive(null);
  };

  const discardWorkout=()=>{db.set(`a:${pid}`,null);setActive(null);};
  const goPickEx=cb=>{setPg('pick-ex');setPgCtx({cb});};
  const profile=PR.find(p=>p.id===pid);

  if(!pid)return html`<${ProfileSelect} onSel=${p=>setPid(p)}/>`;
  if(!ready)return html`<${Wrap} cx=${{alignItems:'center',justifyContent:'center',color:C.txt2,fontSize:14}}>ؤگang tل؛£i...</${Wrap}>`;

  if(showCelebration && finishedWorkout){
    return html`<${CelebrationModal} workout=${finishedWorkout} profile=${profile} onClose=${()=>{setShowCelebration(false);setFinishedWorkout(null);}}/>`;
  }

  if(active){
    if(pg==='pick-ex')return html`<${PickEx} exList=${exList} onPick=${e=>{pgCtx&&pgCtx.cb(e);setPg(null);setPgCtx(null);}} onClose=${()=>{setPg(null);setPgCtx(null);}} onAddEx=${ex=>saveC([...exList,ex])}/>`;
    return html`<${ActiveWorkout} workout=${active} onChange=${saveA} onFinish=${finishWorkout} onDiscard=${discardWorkout} onPickEx=${goPickEx}/>`;
  }
  if(pg==='create-prog')return html`<${CreateProg} exList=${exList} onSave=${p=>{saveP([...progs,p]);setPg(null);}} onClose=${()=>setPg(null)}/>`;
  if(pg==='sess-detail')return html`<${SessDetail} session=${pgCtx} onClose=${()=>{setPg.null;setPg(null);setPgCtx(null);}}/>`;

  return html`
    <${Wrap}>
      <div style=${{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch',paddingBottom:20}}>
        ${tab==='home'&&html`<${HomeTab} profile=${profile} progs=${progs} sessions=${sessions} onStart=${startWorkout} onView=${s=>{setPg('sess-detail');setPgCtx(s);}} onSwitch=${()=>setPid(null)}/>`}
        ${tab==='progs'&&html`<${ProgsTab} progs=${progs} onNew=${()=>setPg('create-prog')} onDel=${id=>saveP(progs.filter(p=>p.id!==id))} onStart=${startWorkout}/>`}
        ${tab==='hist'&&html`<${HistTab} sessions=${sessions} onView=${s=>{setPg('sess-detail');setPgCtx(s);}}/>`}
      </div>
      <${TabBar} tab=${tab} onTab=${setTab}/>
    </${Wrap}>`;
}

render(html`<${GymPair}/>`,document.getElementById('root'));
</script>
</body>
</html>
